aid: mapbox
name: Mapbox Webhook / Event / AsyncAPI Surface Review
executed: '2026-05-30T00:00:00.000Z'
scope: |
  Investigate whether Mapbox publishes a documented webhook, callback, server-sent
  events, or other push/streaming surface for its Asset Tracking solution, Mapbox
  Tiling Service (MTS), Uploads API, and broader Maps APIs that could be modeled
  as an AsyncAPI 2.6 specification.
sources:
  - type: Documentation
    url: https://docs.mapbox.com/api/maps/uploads/
    finding: |
      Uploads API documents only synchronous, polling-based status tracking via
      the "Retrieve an upload" and "Retrieve recent upload statuses" endpoints.
      Uploads expose a `progress` (0..1) and `error` property that callers must
      poll. No webhook, callback URL parameter, or push notification mechanism
      is described.
  - type: Documentation
    url: https://docs.mapbox.com/api/maps/mapbox-tiling-service/
    finding: |
      Mapbox Tiling Service (MTS) describes publish jobs as asynchronous, but
      status is only retrievable by polling the "Retrieve a tileset job" and
      "List tileset jobs" endpoints. No webhook subscription, callback URL,
      SSE stream, or AsyncAPI surface is documented for job state transitions
      (queued, processing, success, failed).
  - type: Documentation
    url: https://docs.mapbox.com/api/maps/changelog/
    finding: |
      The Maps service changelog (2016 through 2026) contains no entries
      announcing webhooks, callbacks, event subscriptions, or push notification
      features for Uploads, MTS, or any other Maps service.
  - type: Repository
    url: https://github.com/mapbox/asset-tracking
    finding: |
      The Mapbox "Asset Tracking" repository is a customer-deployed reference
      implementation (AWS + Pulumi), not a Mapbox-hosted API. Its pipeline uses
      AWS IoT Core, Kinesis Data Streams, Lambda, DynamoDB, and Kinesis
      Firehose. External event emission (SNS, EventBridge, webhooks) is listed
      only as a "Next Steps" suggestion for the customer to build, with no
      Mapbox-defined event schema or channel contract. There is no
      Mapbox-published, vendor-stable event surface that could be modeled as
      AsyncAPI without fabrication.
  - type: Documentation
    url: https://docs.mapbox.com/api/overview/
    finding: |
      The API overview enumerates Maps, Navigation, Search, Accounts, Vision,
      and Movement services. None advertise webhooks, callback URLs, SSE, or
      pub/sub channels. Authentication, versioning, rate limits, CORS, and
      pagination are all described in synchronous-request terms.
conclusion: |
  As of 2026-05-30, Mapbox does NOT publish a documented webhook, callback,
  server-sent events, message-broker, or other asynchronous push surface for
  Asset Tracking, Mapbox Tiling Service, the Uploads API, or any other Maps
  service. All long-running operations (uploads, MTS publish jobs) are tracked
  by client-side polling of REST status endpoints.

  Because every event/channel/message in an AsyncAPI 2.6 specification would
  have to be invented (channel names, payload schemas, binding protocol, server
  URL, security scheme), authoring such a spec would violate the no-fabrication
  rule. No AsyncAPI file was created.
recommendation: |
  - Do NOT add an AsyncAPI property to apis.yml for Mapbox at this time.
  - Re-check the Maps changelog and Mapbox blog quarterly; if Mapbox ships a
    webhook or event subscription product, model only what is documented.
  - If a customer needs push semantics today, the only path is to wrap the
    polling endpoints (Uploads retrieve, MTS jobs list/retrieve) in an
    in-house adapter; that adapter is the customer's contract, not Mapbox's.
checked_surfaces:
  - Mapbox Uploads API
  - Mapbox Tiling Service (MTS)
  - Mapbox Vector Tiles API
  - Mapbox Raster Tiles API
  - Mapbox Static Tiles API
  - Mapbox Static Images API
  - Mapbox Styles API
  - Mapbox Tilequery API
  - Mapbox Datasets API
  - Mapbox Fonts API
  - Mapbox Asset Tracking (reference solution)
  - Maps service changelog
asyncapi_spec_created: false
