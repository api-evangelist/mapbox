principles:
  - name: Visibility
    description: Use Statistics API for per-token per-product usage daily.
  - name: Allocation
    description: Use distinct access tokens per app/feature for chargeback.
  - name: Optimization
    description: Cache tile responses where licenses permit; pick metered vs unlimited Navigation by trip-volume
      crossover.
  - name: Accountability
    description: Set spend alerts at $X per token; revoke unused tokens.
